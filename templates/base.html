<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Điểm Danh SV{% endblock %}</title>
    <style>
      /* ── RESET & BASE ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: #f0f2f5;
          color: #333;
          min-height: 100vh;
      }

      /* ── NAVBAR ── */
      .navbar {
          background: linear-gradient(135deg, #1e3a5f, #2c5f8a);
          padding: 0 2rem;
          display: flex;
          align-items: center;
          height: 60px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.15);
          position: sticky;
          top: 0;
          z-index: 100;
      }
      .navbar .logo {
          color: #fff;
          font-size: 1.25rem;
          font-weight: 700;
          margin-right: 2rem;
          text-decoration: none;
          white-space: nowrap;
      }
      .navbar .logo span { color: #5cb8ff; }
      .navbar nav { display: flex; gap: 0.25rem; }
      .navbar nav a {
          color: rgba(255,255,255,0.8);
          text-decoration: none;
          padding: 0.5rem 1rem;
          border-radius: 6px;
          font-size: 0.9rem;
          transition: all 0.2s;
      }
      .navbar nav a:hover,
      .navbar nav a.active {
          background: rgba(255,255,255,0.15);
          color: #fff;
      }

      /* ── CONTAINER ── */
      .container {
          max-width: 1100px;
          margin: 2rem auto;
          padding: 0 1.5rem;
      }

      /* ── CARDS ── */
      .card {
          background: #fff;
          border-radius: 12px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.06);
          padding: 1.5rem 2rem;
          margin-bottom: 1.5rem;
      }
      .card h2 {
          font-size: 1.3rem;
          margin-bottom: 1rem;
          color: #1e3a5f;
          border-bottom: 2px solid #e8ecf1;
          padding-bottom: 0.5rem;
      }

      /* ── FLASH MESSAGES ── */
      .flash {
          padding: 0.75rem 1.25rem;
          border-radius: 8px;
          margin-bottom: 1rem;
          font-size: 0.95rem;
      }
      .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      .flash.info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

      /* ── BUTTONS ── */
      .btn {
          display: inline-block;
          padding: 0.6rem 1.5rem;
          border: none;
          border-radius: 8px;
          font-size: 0.95rem;
          font-weight: 600;
          cursor: pointer;
          text-decoration: none;
          transition: all 0.2s;
      }
      .btn-primary   { background: #2c5f8a; color: #fff; }
      .btn-primary:hover { background: #1e4a6e; }
      .btn-success   { background: #28a745; color: #fff; }
      .btn-success:hover { background: #218838; }
      .btn-danger    { background: #dc3545; color: #fff; }
      .btn-danger:hover  { background: #c82333; }
      .btn-outline   { background: transparent; color: #2c5f8a; border: 2px solid #2c5f8a; }
      .btn-outline:hover { background: #2c5f8a; color: #fff; }
      .btn-sm        { padding: 0.35rem 0.8rem; font-size: 0.85rem; }

      /* ── FORMS ── */
      .form-group {
          margin-bottom: 1rem;
      }
      .form-group label {
          display: block;
          font-weight: 600;
          margin-bottom: 0.3rem;
          color: #444;
          font-size: 0.9rem;
      }
      .form-group input,
      .form-group select {
          width: 100%;
          padding: 0.6rem 0.8rem;
          border: 2px solid #dde1e6;
          border-radius: 8px;
          font-size: 0.95rem;
          transition: border-color 0.2s;
      }
      .form-group input:focus,
      .form-group select:focus {
          outline: none;
          border-color: #2c5f8a;
      }
      .form-row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 1rem;
      }

      /* ── TABLE ── */
      .table-wrap { overflow-x: auto; }
      table {
          width: 100%;
          border-collapse: collapse;
      }
      table th, table td {
          text-align: left;
          padding: 0.7rem 1rem;
          border-bottom: 1px solid #eee;
      }
      table th {
          background: #f7f9fb;
          color: #555;
          font-size: 0.85rem;
          text-transform: uppercase;
          letter-spacing: 0.5px;
      }
      table tr:hover { background: #f5f8fc; }

      /* ── BADGE ── */
      .badge {
          display: inline-block;
          padding: 0.2rem 0.6rem;
          border-radius: 12px;
          font-size: 0.8rem;
          font-weight: 600;
      }
      .badge-success { background: #d4edda; color: #155724; }
      .badge-info    { background: #d1ecf1; color: #0c5460; }

      /* ── STAT CARDS ── */
      .stats {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 1rem;
          margin-bottom: 1.5rem;
      }
      .stat-card {
          background: #fff;
          border-radius: 12px;
          padding: 1.25rem;
          box-shadow: 0 2px 8px rgba(0,0,0,0.06);
          text-align: center;
      }
      .stat-card .number {
          font-size: 2.2rem;
          font-weight: 700;
          color: #2c5f8a;
      }
      .stat-card .label {
          font-size: 0.85rem;
          color: #777;
          margin-top: 0.25rem;
      }

      /* ── FOOTER ── */
      .footer {
          text-align: center;
          padding: 1.5rem;
          color: #999;
          font-size: 0.8rem;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
          .form-row { grid-template-columns: 1fr; }
          .navbar { padding: 0 1rem; }
          .navbar nav a { padding: 0.5rem 0.6rem; font-size: 0.8rem; }
      }

      {% block extra_css %}{% endblock %}
    </style>
  </head>
  <body>
    <header class="navbar">
      <a href="/" class="logo">Face<span>Attend</span></a>
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}"
          >Trang chủ</a
        >
        <a
          href="/register"
          class="{% if '/register' in request.url.path %}active{% endif %}"
          >Đăng ký SV</a
        >
        <a
          href="/students"
          class="{% if '/students' in request.url.path %}active{% endif %}"
          >Danh sách</a
        >
        <a
          href="/courses"
          class="{% if '/courses' in request.url.path %}active{% endif %}"
          >Lớp tín chỉ</a
        >
        <a
          href="/attendance"
          class="{% if '/attendance' in request.url.path %}active{% endif %}"
          >Điểm danh</a
        >
        <a
          href="/history"
          class="{% if '/history' in request.url.path %}active{% endif %}"
          >Lịch sử</a
        >
      </nav>
    </header>

    <main class="container">{% block content %}{% endblock %}</main>

    <footer class="footer">
      &copy; 2026 — Hệ thống Điểm danh Sinh viên CNTT | FastAPI + Redis +
      pgvector
    </footer>

    {% block extra_js %}{% endblock %}
  </body>
</html>
